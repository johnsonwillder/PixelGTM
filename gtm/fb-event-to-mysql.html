<script>
(function () {
  var trackedEvents = {
    PageView: true,
    ViewContent: true,
    Lead: true,
    CompleteRegistration: true,
    InitiateCheckout: true,
    Purchase: true,
    AddToCart: true,
    Contact: true,
    Search: true,
    "gtm.js": true,
    "gtm.dom": true,
    "gtm.load": true,
    "gtm.historyChange": true,
    "gtm.formSubmit": true,
    "gtm.linkClick": true,
    "gtm.click": true
  };

  var eventName = "{{Event}}";

  if (!eventName || !trackedEvents[eventName]) {
    return;
  }

  ensureFacebookClickCookie();

  var eventId = [
    eventName,
    Date.now(),
    Math.random().toString(36).slice(2)
  ].join("-");

  var payload = {
    event_name: eventName,
    event_id: eventId,
    event_time: Math.floor(Date.now() / 1000),
    page_url: window.location.href,
    referrer: document.referrer || null,
    user_agent: navigator.userAgent,
    fbp: getCookie("_fbp"),
    fbc: getCookie("_fbc"),
    value: readDataLayerValue("value"),
    currency: readDataLayerValue("currency"),
    content_ids: readDataLayerValue("content_ids"),
    content_name: readDataLayerValue("content_name"),
    content_category: readDataLayerValue("content_category"),
    content_type: readDataLayerValue("content_type"),
    lead_type: readDataLayerValue("lead_type"),
    button_text: readDataLayerValue("button_text"),
    page_type: readDataLayerValue("page_type"),
    registration_type: readDataLayerValue("registration_type"),
    checkout_type: readDataLayerValue("checkout_type"),
    checkout_step: readDataLayerValue("checkout_step"),
    deposit_method: readDataLayerValue("deposit_method"),
    purchase_type: readDataLayerValue("purchase_type"),
    purchase_step: readDataLayerValue("purchase_step"),
    payment_status: readDataLayerValue("payment_status")
  };

  fetch("https://YOUR-WEBSITE-DOMAIN.com/fb-event-track.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    keepalive: true,
    body: JSON.stringify(payload)
  }).catch(function () {});

  function getCookie(name) {
    var match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? decodeURIComponent(match[2]) : null;
  }

  function ensureFacebookClickCookie() {
    if (getCookie("_fbc")) {
      return;
    }

    var fbclid = getQueryParam("fbclid");
    if (!fbclid) {
      return;
    }

    var timestamp = Math.floor(Date.now());
    var fbc = "fb.1." + timestamp + "." + fbclid;
    var maxAge = 90 * 24 * 60 * 60;

    document.cookie = [
      "_fbc=" + encodeURIComponent(fbc),
      "Max-Age=" + maxAge,
      "Path=/",
      "SameSite=Lax",
      location.protocol === "https:" ? "Secure" : ""
    ].filter(Boolean).join("; ");
  }

  function getQueryParam(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function readDataLayerValue(key) {
    var dataLayer = window.dataLayer || [];

    for (var i = dataLayer.length - 1; i >= 0; i--) {
      if (dataLayer[i] && Object.prototype.hasOwnProperty.call(dataLayer[i], key)) {
        return dataLayer[i][key];
      }
    }

    return null;
  }
})();
</script>
